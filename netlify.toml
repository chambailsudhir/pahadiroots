# netlify.toml
# ═══════════════════════════════════════════════════════════════════
# Pahadi Roots — Netlify Configuration
# ═══════════════════════════════════════════════════════════════════

[build]
  functions = "netlify/functions"
  publish   = "."

# ── Redirect rules ──────────────────────────────────────────────────
# Admin: only served after Netlify password gate (set in site settings)
[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

[[redirects]]
  from   = "/"
  to     = "/index.html"
  status = 200

# ── Security headers ────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Stricter headers for admin — prevents caching of admin page
[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag  = "noindex, nofollow"
