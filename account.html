<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Account — Pahadi Roots</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root{--g:#1a3a1e;--g2:#2d5233;--g3:#3d6b42;--gd:#c8920a;--gd2:#e8b84b;--tx:#1a1a1a;--tx2:#4a4a4a;--tx3:#7a7a7a;--bd:#eeeeee}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:#f7f3ee;min-height:100vh;color:var(--tx)}

/* ── NAV ── */
.nav{background:#fff;border-bottom:1px solid rgba(26,58,30,.1);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{font-size:22px}
.logo-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--g)}
.logo-tl{font-size:10px;color:var(--gd);font-weight:700;letter-spacing:.5px}
.nav-right a{color:var(--g);font-size:13px;font-weight:700;text-decoration:none;border:1.5px solid var(--g);padding:7px 16px;border-radius:20px;transition:all .2s}
.nav-right a:hover{background:var(--g);color:#fff}

/* ── LAYOUT ── */
.page{max-width:1100px;margin:0 auto;padding:28px 16px 60px;display:grid;grid-template-columns:280px 1fr;gap:28px;align-items:start}
@media(max-width:768px){.page{grid-template-columns:1fr;padding:0 0 60px}}

/* ── SIDEBAR ── */
.sidebar{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);position:sticky;top:76px}
.sb-profile{background:linear-gradient(135deg,var(--g),var(--g2));padding:24px;text-align:center}
.sb-avatar{width:64px;height:64px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:#fff;border:3px solid rgba(255,255,255,.3);margin:0 auto 12px}
.sb-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:#fff;margin-bottom:3px}
.sb-email{font-size:12px;color:rgba(255,255,255,.65)}
.sb-nav{padding:8px 0}
.sb-item{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;transition:all .2s;border:none;background:none;width:100%;text-align:left;font-family:'Lato',sans-serif;font-size:14px;font-weight:700;color:var(--tx2);border-left:3px solid transparent}
.sb-item:hover{background:rgba(26,58,30,.05);color:var(--g)}
.sb-item.active{background:rgba(26,58,30,.07);color:var(--g);border-left-color:var(--g)}
.sb-item .icon{font-size:16px;width:20px;text-align:center}
.sb-divider{height:1px;background:#f0f0f0;margin:8px 0}
.sb-item.logout{color:#c0392b}
.sb-item.logout:hover{background:#fdecea}

/* ── MAIN PANEL ── */
.main-panel{display:flex;flex-direction:column;gap:20px}

/* ── CARDS ── */
.card{background:#fff;border-radius:18px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.card-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--g);margin-bottom:20px;display:flex;align-items:center;gap:8px}

/* ── SECTION LABEL ── */
.sec-label{font-size:11px;font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}

/* ── ORDER CARDS ── */
.order-card{border:1.5px solid var(--bd);border-radius:16px;padding:22px 24px;margin-bottom:16px;transition:border-color .2s,box-shadow .2s;cursor:default}
.order-card:hover{border-color:var(--g);box-shadow:0 4px 16px rgba(26,58,30,0.08)}
.oc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.oc-num{font-weight:900;font-size:17px;color:var(--g)}
.oc-badge{padding:5px 16px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.badge-confirmed{background:#e8f5e9;color:#2d6a4f}
.badge-shipped{background:#e3f2fd;color:#1565c0}
.badge-delivered{background:#ede7f6;color:#6a1b9a}
.badge-pending{background:#fff8e1;color:#e65100}
.badge-cancelled{background:#fdecea;color:#c0392b}
.badge-processing{background:#e8f5e9;color:#2d6a4f}
.badge-returned{background:#e8f5e9;color:#2d6a4f}
.badge-return_requested{background:#fff3e0;color:#e65100}
.badge-return_approved{background:#e3f2fd;color:#1565c0}
.badge-return_received{background:#f3e5f5;color:#7b1fa2}
.badge-refunded{background:#e8f5e9;color:#2d6a4f}
.badge-return_rejected{background:#fdecea;color:#c0392b}
.oc-items{font-size:14px;color:var(--tx3);margin-bottom:12px;line-height:1.6}
.oc-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.oc-total{font-weight:900;font-size:18px;color:var(--g)}
.oc-date{font-size:13px;color:var(--tx3)}
.oc-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px}
.track-chip{display:inline-flex;align-items:center;gap:4px;background:var(--g);color:#fff;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:800;text-decoration:none;transition:background .2s}
.track-chip:hover{background:var(--g2)}
.view-chip{display:inline-flex;align-items:center;gap:4px;background:#f0f7f4;color:var(--g);border:1.5px solid #c8e6c9;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:800;text-decoration:none;transition:all .2s}
.view-chip:hover{background:var(--g);color:#fff}

/* ── ADDRESS CARDS ── */
.addr-cards{display:flex;flex-direction:column;gap:10px}
.addr-card{border:1.5px solid var(--bd);border-radius:14px;padding:14px 16px;transition:all .2s}
.addr-card.default{border-color:#c8e6c9;background:#f0f7f4}
.addr-label{display:flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--g);margin-bottom:4px}
.addr-line{font-size:13px;color:var(--tx2);line-height:1.6}
.addr-actions{display:flex;gap:8px;margin-top:10px}
.addr-btn{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid;font-family:'Lato',sans-serif;transition:all .2s}
.addr-btn-del{border-color:#fdecea;color:#c0392b;background:#fff}
.addr-btn-del:hover{background:#fdecea}

/* ── PROFILE FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.form-full{grid-column:1/-1}
.field-label{font-size:11px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.field-input{width:100%;padding:11px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;font-family:'Lato',sans-serif;color:var(--tx);transition:border-color .2s;outline:none;background:#fff}
.field-input:focus{border-color:var(--g)}
.field-input:disabled{background:#f8f8f8;color:var(--tx3)}

/* ── BUTTONS ── */
.btn-primary{background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;border:none;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Lato',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,58,30,.25)}
.btn-outline{background:#fff;color:var(--g);border:2px solid var(--g);padding:11px 24px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Lato',sans-serif;transition:all .2s}
.btn-outline:hover{background:var(--g);color:#fff}
.btn-danger{background:#fff;color:#c0392b;border:2px solid #fdecea;padding:11px 24px;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Lato',sans-serif;transition:all .2s}
.btn-danger:hover{background:#fdecea}
.save-msg{font-size:12px;color:#2d6a4f;margin-top:8px;display:none}
.err-msg{font-size:12px;color:#c0392b;margin-top:8px;display:none}

/* ── LINKED ACCOUNTS ── */
.linked-row{display:flex;align-items:center;gap:10px;background:#e8f5e9;border-radius:10px;padding:11px 14px;margin-bottom:8px}
.linked-icon{font-size:16px}
.linked-info{flex:1;font-size:13px;font-weight:700;color:var(--tx)}
.linked-badge{font-size:11px;color:#2d6a4f;font-weight:700}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 20px}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--g);margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--tx3);margin-bottom:24px}

/* ── LOGIN WALL ── */
.login-wall{background:#fff;border-radius:18px;padding:48px 32px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.lw-icon{font-size:56px;margin-bottom:16px}
.lw-title{font-family:'Playfair Display',serif;font-size:26px;color:var(--g);margin-bottom:8px}
.lw-sub{font-size:14px;color:var(--tx3);margin-bottom:28px;line-height:1.6}

/* ── LOADING ── */
.loading{text-align:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:var(--g);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MOBILE TABS (bottom bar on mobile) ── */
@media(max-width:768px){
  .sidebar{display:none}
  .mob-tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.08)}
  .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px;border:none;background:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:10px;font-weight:700;color:#aaa;gap:3px;transition:color .2s}
  .mob-tab.active{color:var(--g)}
  .mob-tab .mt-icon{font-size:20px}
  .page{padding:16px 12px 80px}
}
@media(min-width:769px){.mob-tabs{display:none!important}}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="logo">
    <div class="logo-icon">🌿</div>
    <div><div class="logo-name">Pahadi Roots</div><div class="logo-tl">Himalayan Organic Store</div></div>
  </a>
  <div class="nav-right"><a href="/">🛍️ Continue Shopping</a></div>
</nav>

<div class="page" id="page">
  <!-- Sidebar (desktop) -->
  <aside class="sidebar" id="sidebar" style="display:none">
    <div class="sb-profile">
      <div class="sb-avatar" id="sb-avatar">?</div>
      <div class="sb-name" id="sb-name">—</div>
      <div class="sb-email" id="sb-email">—</div>
    </div>
    <div class="sb-nav">
      <button class="sb-item active" data-tab="orders" onclick="switchTab('orders')"><span class="icon">📦</span> My Orders</button>
      <button class="sb-item" data-tab="addresses" onclick="switchTab('addresses')"><span class="icon">📍</span> Addresses</button>
      <button class="sb-item" data-tab="profile" onclick="switchTab('profile')"><span class="icon">👤</span> Profile</button>
      <button class="sb-item" data-tab="password" onclick="switchTab('password')"><span class="icon">🔒</span> Change Password</button>
      <div class="sb-divider"></div>
      <button class="sb-item logout" onclick="doLogout()"><span class="icon">🚪</span> Logout</button>
    </div>
  </aside>

  <!-- Main panel -->
  <div class="main-panel" id="main-panel">
    <div class="loading"><div class="spinner"></div><p style="color:var(--tx3);font-size:14px">Loading your account...</p></div>
  </div>
</div>

<!-- Mobile bottom tabs -->
<div class="mob-tabs" id="mob-tabs" style="display:none">
  <button class="mob-tab active" data-tab="orders" onclick="switchTab('orders')"><span class="mt-icon">📦</span>Orders</button>
  <button class="mob-tab" data-tab="addresses" onclick="switchTab('addresses')"><span class="mt-icon">📍</span>Addresses</button>
  <button class="mob-tab" data-tab="profile" onclick="switchTab('profile')"><span class="mt-icon">👤</span>Profile</button>
  <button class="mob-tab" data-tab="password" onclick="switchTab('password')"><span class="mt-icon">🔒</span>Password</button>
  <button class="mob-tab" onclick="doLogout()"><span class="mt-icon">🚪</span>Logout</button>
</div>

<script>
// ── Config ──
var API_BASE = '/api';
var _authToken = null, _authUser = null, _authProfile = null;
var _currentTab = 'orders';
var _orders = null;

// ── Restore session ──
try { _authToken = localStorage.getItem('pr_auth_token') || null; } catch(e){}
try { _authUser = JSON.parse(localStorage.getItem('pr_auth_user') || 'null'); } catch(e){}
try { _authProfile = JSON.parse(localStorage.getItem('pr_auth_profile') || 'null'); } catch(e){}

// ── API helpers ──
async function callAuth(action, body, useToken) {
  var headers = { 'Content-Type': 'application/json' };
  if (useToken && _authToken) headers['Authorization'] = 'Bearer ' + _authToken;
  var controller = new AbortController();
  var _t = setTimeout(function() { controller.abort(); }, 10000);
  try {
    var res = await fetch(API_BASE + '/auth', {
      method: 'POST', headers,
      body: JSON.stringify({ action, ...body }),
      signal: controller.signal
    });
    clearTimeout(_t);
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error');
    return data;
  } catch(e) {
    clearTimeout(_t);
    throw e;
  }
}


// ── Init ──
async function init() {
  if (!_authToken) { showLoginWall(); return; }

  // Set a hard timeout — agar 12 sec mein response nahi aaya toh login wall dikhao
  var _initDone = false;
  var _timeout = setTimeout(function() {
    if (!_initDone) {
      console.warn('Account init timed out');
      // Try refresh token before giving up
      var rt = null;
      try { rt = localStorage.getItem('pr_auth_refresh'); } catch(e){}
      if (rt) {
        tryRefreshThenInit(rt);
      } else {
        showLoginWall();
      }
    }
  }, 10000);

  try {
    var data = await callAuth('get_profile', {}, true);
    _initDone = true;
    clearTimeout(_timeout);
    _authProfile = data.profile;
    _authUser = data.user;
    if (data.orders) _orders = data.orders;
    try { localStorage.setItem('pr_auth_profile', JSON.stringify(data.profile)); } catch(e){}
    if (!_authProfile) { showLoginWall(); return; }
    showAccount();
    switchTab('orders');
  } catch(e) {
    _initDone = true;
    clearTimeout(_timeout);
    // Token expired — try refresh
    var rt = null;
    try { rt = localStorage.getItem('pr_auth_refresh'); } catch(e2){}
    if (rt) {
      await tryRefreshThenInit(rt);
    } else {
      showLoginWall();
    }
  }
}

async function tryRefreshThenInit(refreshToken) {
  try {
    var r = await callAuth('refresh_token', { refresh_token: refreshToken }, false);
    if (r.access_token) {
      _authToken = r.access_token;
      try { localStorage.setItem('pr_auth_token', r.access_token); } catch(e){}
      if (r.refresh_token) { try { localStorage.setItem('pr_auth_refresh', r.refresh_token); } catch(e){} }
      var data = await callAuth('get_profile', {}, true);
      _authProfile = data.profile; _authUser = data.user;
      if (data.orders) _orders = data.orders;
      try { localStorage.setItem('pr_auth_profile', JSON.stringify(data.profile)); } catch(e){}
      if (!_authProfile) { showLoginWall(); return; }
      showAccount();
      switchTab('orders');
    } else {
      showLoginWall();
    }
  } catch(e) {
    showLoginWall();
  }
}

function showLoginWall() {
  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('mob-tabs').style.display = 'none';
  document.getElementById('main-panel').innerHTML = `
    <div class="login-wall">
      <div class="lw-icon">🔐</div>
      <div class="lw-title">Login Required</div>
      <div class="lw-sub">Apna account dekhne ke liye pehle login karein.<br>Orders, addresses aur profile sab ek jagah milega.</div>
      <a href="/?login=1" class="btn-primary" style="display:inline-flex;margin:0 auto">👤 Login / Sign Up</a>
    </div>`;
}

function showAccount() {
  var p = _authProfile || {};
  var u = _authUser || {};
  var firstName = p.first_name || (u.user_metadata && u.user_metadata.full_name && u.user_metadata.full_name.split(' ')[0]) || 'User';
  var fullName = [p.first_name, p.last_name].filter(Boolean).join(' ') || firstName;
  var email = u.email || p.email || '';
  var initials = (firstName[0] || '?').toUpperCase();

  document.getElementById('sb-avatar').textContent = initials;
  document.getElementById('sb-name').textContent = fullName;
  document.getElementById('sb-email').textContent = email;
  document.getElementById('sidebar').style.display = 'block';
  document.getElementById('mob-tabs').style.display = 'flex';
}

// ── Tab switching ──
function switchTab(tab, btn) {
  _currentTab = tab;
  // Remove active from ALL nav items (sidebar + mobile)
  document.querySelectorAll('.sb-item').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.mob-tab').forEach(b => b.classList.remove('active'));
  // Add active to matching tab in BOTH panels by data-tab attribute
  document.querySelectorAll('[data-tab="' + tab + '"]').forEach(b => b.classList.add('active'));

  if (tab === 'orders') renderOrdersTab();
  else if (tab === 'addresses') renderAddressesTab();
  else if (tab === 'profile') renderProfileTab();
  else if (tab === 'password') renderPasswordTab();
}

// ══════════════════════════════════════════════
// ORDERS TAB
// ══════════════════════════════════════════════
async function renderOrdersTab() {
  setPanel('<div class="loading"><div class="spinner"></div></div>');
  try {
    if (!_orders) {
      // Reload from server if needed
      var data = await callAuth('get_profile', {}, true);
      _orders = data.orders || [];
    }
    window._lastOrders = _orders;
    setPanel(buildOrdersHtml(_orders));
  } catch(e) {
    setPanel('<div class="card"><p style="color:var(--tx3)">Orders load nahi ho sake. Dobara try karein.</p></div>');
  }
}

var COURIER_URLS = {
  'Delhivery': 'https://www.delhivery.com/track/package/',
  'BlueDart': 'https://www.bluedart.com/tracking?trackFor=0&trackNum=',
  'DTDC': 'https://tracking.dtdc.com/ctbs-tracking/customerInterface.tr?submitName=showCustLoginPage&cType=self&trackType=cnNo&strCNno=',
  'Ekart': 'https://ekartlogistics.com/shipmenttrack/',
  'Xpressbees': 'https://www.xpressbees.com/track?awbnumber=',
};

async function cancelOrder(orderId, orderNum) {
  if (!confirm('Cancel order ' + orderNum + '? This cannot be undone.')) return;
  try {
    var res = await fetch('/api/admin-api', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'update_row', table:'orders', id: orderId, data:{ order_status:'cancelled' } })
    });
    if (res.ok) {
      showToast('✅ Order ' + orderNum + ' cancelled');
      _orders = null; // force reload
      renderOrdersTab();
    } else { showToast('❌ Cancel failed. Contact support.'); }
  } catch(e) { showToast('❌ Network error'); }
}



function renderOrders(orders) {
  setPanel(buildOrdersHtml(orders));
}

function buildOrdersHtml(orders) {
  window._lastOrders = orders;
  var badges = {
    confirmed:'badge-confirmed', shipped:'badge-shipped', delivered:'badge-delivered',
    pending:'badge-pending', cancelled:'badge-cancelled', processing:'badge-processing',
    returned:'badge-returned', packed:'badge-shipped',
    return_requested:'badge-return_requested',
    return_approved:'badge-return_requested',
    return_received:'badge-processing',
    refunded:'badge-delivered',
    return_rejected:'badge-cancelled',
  };
  if (!orders.length) return `
    <div class="empty-state">
      <div class="empty-icon">📦</div>
      <div class="empty-title">No orders yet</div>
      <div class="empty-sub">Aapne abhi tak koi order nahi kiya.<br>Apni pasandida Himalayan products explore karein!</div>
      <a href="/" class="btn-primary" style="display:inline-flex">🛍️ Shop Now</a>
    </div>`;

  var statusLabels = {
    confirmed:'Confirmed', shipped:'Shipped', delivered:'Delivered',
    pending:'Pending', cancelled:'Cancelled', processing:'Processing',
    returned:'Returned', packed:'Packed',
    return_requested:'Return Requested',
    return_approved:'Return Approved',
    return_received:'Item Received',
    refunded:'Refund Issued',
    return_rejected:'Return Rejected',
  };

  return '<div class="card"><div class="card-title">📦 My Orders <span style="font-size:15px;font-weight:400;color:var(--tx3);font-family:Lato,sans-serif">(' + orders.length + ')</span></div>' +
    orders.map(function(o) {
      var displayStatus = o._displayStatus || o.order_status;
      var items = (o.items || []).slice(0,2).map(function(i){ return (i.emoji||'🌿') + ' ' + (i.name||'Product') + ' ×' + (i.qty||i.quantity||1); }).join(' · ');
      if (o.items && o.items.length > 2) items += ' +' + (o.items.length-2) + ' more';
      var badge = badges[displayStatus] || 'badge-pending';
      var date = o.created_at ? new Date(o.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '';
      var trackUrl = o.tracking_number ? (COURIER_URLS[o.courier] ? COURIER_URLS[o.courier] + o.tracking_number : 'https://www.google.com/search?q=' + encodeURIComponent((o.courier||'') + ' tracking ' + o.tracking_number)) : '';
      var viewUrl = '/order-confirmation?id=' + o.id + '&num=' + encodeURIComponent(o.order_number||'');
      var estDelivery = '';
      if (o.order_status === 'delivered') {
        estDelivery = '<span style="font-size:12px;color:#2e7d32;font-weight:700">✅ Delivered</span>';
      } else if (o.order_status === 'shipped' && o.shipped_at) {
        var shipDate = new Date(o.shipped_at); shipDate.setDate(shipDate.getDate() + 5);
        estDelivery = '<span style="font-size:12px;color:var(--gd);font-weight:700">🚚 Est. delivery: ' + shipDate.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) + '</span>';
      } else if (o.order_status === 'confirmed' || o.order_status === 'processing') {
        var orderDate = new Date(o.created_at||Date.now()); orderDate.setDate(orderDate.getDate() + 7);
        estDelivery = '<span style="font-size:12px;color:var(--tx3);font-weight:600">📅 Est. delivery: ' + orderDate.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) + '</span>';
      } else if (displayStatus === 'return_requested') {
        estDelivery = '<span style="font-size:12px;color:#e65100;font-weight:700">⏳ Return under review · 24–48 hrs</span>';
      } else if (displayStatus === 'return_approved') {
        estDelivery = '<span style="font-size:12px;color:#1565c0;font-weight:700">✅ Return approved · Please ship item back</span>';
      } else if (displayStatus === 'return_received') {
        estDelivery = '<span style="font-size:12px;color:#7b1fa2;font-weight:700">📦 Item received · Refund processing</span>';
      } else if (displayStatus === 'refunded') {
        estDelivery = '<span style="font-size:12px;color:#2d6a4f;font-weight:700">💸 Refund issued to original payment method</span>';
      } else if (displayStatus === 'return_rejected') {
        estDelivery = '<span style="font-size:12px;color:#c0392b;font-weight:700">❌ Return request rejected</span>';
      } else if (o.order_status === 'returned') {
        estDelivery = '<span style="font-size:12px;color:#2d6a4f;font-weight:700">✓ Return processed</span>';
      }
      var cancelBtn = (o.order_status === 'pending' || o.order_status === 'confirmed')
        ? '<button onclick="cancelOrder(\'' + o.id + '\',\'' + (o.order_number||o.id) + '\')" style="border:1.5px solid #fdecea;background:#fff;color:#c0392b;font-size:12px;font-weight:700;cursor:pointer;padding:6px 14px;border-radius:20px;font-family:Lato,sans-serif">❌ Cancel</button>'
        : '';
      var returnBtn = '';
      var isReturnStatus = ['return_requested','return_approved','return_received','refunded','return_rejected'].includes(displayStatus);
      if (o.order_status === 'delivered' && !isReturnStatus) {
        returnBtn = '<button onclick="openReturnModal(\'' + o.id + '\',\'' + encodeURIComponent(JSON.stringify(o)) + '\')" style="display:inline-flex;align-items:center;gap:4px;background:#fff5f5;color:#c0392b;border:1.5px solid #fdecea;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:800;cursor:pointer;font-family:Lato,sans-serif;transition:all .2s" onmouseover="this.style.background=\'#c0392b\';this.style.color=\'#fff\'" onmouseout="this.style.background=\'#fff5f5\';this.style.color=\'#c0392b\'">↩ Return</button>';
      } else if (isReturnStatus || o.order_status === 'returned') {
        var retConfig = {
          return_requested: { label:'⏳ Return Requested', color:'#e65100', bg:'#fff3e0', bd:'#ffe0b2' },
          return_approved:  { label:'✅ Return Approved',  color:'#1565c0', bg:'#e3f2fd', bd:'#90caf9' },
          return_received:  { label:'📦 Item Received',    color:'#7b1fa2', bg:'#f3e5f5', bd:'#ce93d8' },
          refunded:         { label:'💸 Refund Issued',    color:'#2d6a4f', bg:'#e8f5e9', bd:'#a5d6a7' },
          return_rejected:  { label:'❌ Rejected',          color:'#c0392b', bg:'#fdecea', bd:'#ef9a9a' },
          returned:         { label:'✓ Return Processed',  color:'#2d6a4f', bg:'#e8f5e9', bd:'#c8e6c9' },
        };
        var rc = retConfig[displayStatus] || retConfig['returned'];
        returnBtn = '<button onclick="openReturnStatusModal(\'' + o.id + '\',\'' + encodeURIComponent(JSON.stringify(o)) + '\')" style="display:inline-flex;align-items:center;gap:4px;background:' + rc.bg + ';color:' + rc.color + ';border:1.5px solid ' + rc.bd + ';padding:6px 16px;border-radius:20px;font-size:12px;font-weight:800;cursor:pointer;font-family:Lato,sans-serif">' + rc.label + '</button>';
      }
      // Build product image strip (Amazon-style)
      var allItems = o.items || [];
      var imgStrip = allItems.slice(0,4).map(function(it){
        if (it.image_url) {
          return '<img src="' + it.image_url + '" style="width:72px;height:72px;object-fit:cover;border-radius:10px;border:1.5px solid #eee;flex-shrink:0" onerror="this.style.display=\'none\'" title="' + (it.name||'') + '">';
        }
        return '<div style="width:72px;height:72px;border-radius:10px;background:linear-gradient(135deg,#f5f0e8,#e8e0d0);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;border:1.5px solid #eee" title="' + (it.name||'') + '">' + (it.emoji||'🌿') + '</div>';
      }).join('');
      if (allItems.length > 4) imgStrip += '<div style="width:72px;height:72px;border-radius:10px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#7a7a7a;flex-shrink:0;border:1.5px solid #eee">+' + (allItems.length-4) + '</div>';

      // Item names
      var itemNames = allItems.slice(0,3).map(function(i){ return (i.name||'Product') + ' ×' + (i.qty||1); }).join(', ');
      if (allItems.length > 3) itemNames += ' & ' + (allItems.length-3) + ' more';

      return '<div class="order-card" id="order-card-' + o.id + '">' +
        // Top bar: order number + badge
        '<div class="oc-hdr">' +
          '<div>' +
            '<span class="oc-num">' + (o.order_number||'#'+String(o.id).slice(0,8)) + '</span>' +
            '<span style="font-size:12px;color:#7a7a7a;margin-left:10px;font-weight:500">' + date + '</span>' +
          '</div>' +
          '<span class="oc-badge ' + badge + '">' + (statusLabels[displayStatus]||displayStatus||'pending') + '</span>' +
        '</div>' +
        // Product image strip
        (imgStrip ? '<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">' + imgStrip + '</div>' : '') +
        // Item names
        '<div style="font-size:14px;color:#3a3a3a;margin-bottom:10px;line-height:1.5;font-weight:500">' + itemNames + '</div>' +
        // Status line
        (estDelivery ? '<div style="margin-bottom:12px">' + estDelivery + '</div>' : '') +
        // Divider
        '<div style="border-top:1px solid #f0f0f0;margin:14px 0"></div>' +
        // Footer: amount + actions
        '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">' +
          '<span class="oc-total">₹' + (o.total_amount||0).toLocaleString('en-IN') + '</span>' +
          '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">' +
            '<a href="' + viewUrl + '" class="view-chip" style="font-size:12px;padding:7px 16px">📄 View Order</a>' +
            (trackUrl ? '<a href="' + trackUrl + '" target="_blank" class="track-chip" style="font-size:12px;padding:7px 16px">🚚 Track</a>' : '') +
            '<a href="/order-confirmation?id=' + o.id + '&num=' + encodeURIComponent(o.order_number||'') + '&print=1" target="_blank" class="view-chip" style="font-size:12px;padding:7px 16px" title="Invoice">🧾 Invoice</a>' +
            cancelBtn +
            returnBtn +
          '</div>' +
        '</div>' +
        '</div>';
    }).join('') + '</div>';
}

function getSavedAddresses() {
  try { return JSON.parse((_authProfile && _authProfile.saved_addresses) || localStorage.getItem('pr_saved_addresses') || '[]'); } catch(e) { return []; }
}

function renderAddressesTab() {
  var p = _authProfile || {};
  var addrs = getSavedAddresses();
  var html = '<div class="card"><div class="card-title">📍 Delivery Addresses</div>';

  // Default address from profile
  if (p.address_line1) {
    html += '<div class="addr-card default">' +
      '<div class="addr-label">🏠 Default</div>' +
      '<div class="addr-line">' + [p.first_name, p.last_name].filter(Boolean).join(' ') + '<br>' + [p.address_line1, p.city, p.state, p.postal_code].filter(Boolean).join(', ') + '</div>' +
      '<div class="addr-actions"><button class="addr-btn" onclick="switchTab(\'profile\')" style="border-color:#c8e6c9;color:var(--g);background:#fff">✏️ Edit</button></div>' +
      '</div>';
  }

  // Extra saved addresses
  addrs.filter(function(a){ return a.label !== 'Default'; }).forEach(function(a, i) {
    var icon = a.label === 'Parents' ? '👨‍👩‍👦' : a.label === 'Office' ? '🏢' : '📍';
    html += '<div class="addr-card">' +
      '<div class="addr-label">' + icon + ' ' + (a.label||'Address') + '</div>' +
      '<div class="addr-line">' + (a.name||'') + (a.name?'<br>':'') + (a.addr||'') + ', ' + (a.city||'') + ' — ' + (a.pin||'') + '</div>' +
      '<div class="addr-actions"><button class="addr-btn addr-btn-del" onclick="deleteSavedAddr(' + i + ')">🗑 Remove</button></div>' +
      '</div>';
  });

  if (!p.address_line1 && !addrs.length) {
    html += '<div class="empty-state"><div class="empty-icon">📍</div><div class="empty-title">No addresses saved</div><div class="empty-sub">Profile mein apna address add karein.</div><button class="btn-primary" onclick="switchTab(\'profile\')">+ Add Address</button></div>';
  }

  html += '</div>';
  setPanel(html);
}

async function deleteSavedAddr(idx) {
  var all = getSavedAddresses();
  var nonDefault = all.filter(function(a){ return a.label !== 'Default'; });
  nonDefault.splice(idx, 1);
  var defaults = all.filter(function(a){ return a.label === 'Default'; });
  var addrs = defaults.concat(nonDefault);
  try {
    await callAuth('update_profile', { saved_addresses: JSON.stringify(nonDefault) }, true);
    _authProfile.saved_addresses = JSON.stringify(nonDefault);
    try { localStorage.setItem('pr_auth_profile', JSON.stringify(_authProfile)); } catch(e){}
    renderAddressesTab();
    showToast('Address removed');
  } catch(e) { showToast('❌ Remove failed'); }
}

async function saveProfileInfo() {
  try {
    var updates = { first_name: document.getElementById('pf-fname').value.trim(), last_name: document.getElementById('pf-lname').value.trim() };
    await callAuth('update_profile', updates, true);
    Object.assign(_authProfile, updates);
    try { localStorage.setItem('pr_auth_profile', JSON.stringify(_authProfile)); } catch(e){}
    showSaveMsg('pf-msg');
    document.getElementById('sb-name').textContent = [updates.first_name, updates.last_name].filter(Boolean).join(' ');
    document.getElementById('sb-avatar').textContent = (updates.first_name[0]||'?').toUpperCase();
  } catch(e) { showToast('❌ Save failed'); }
}



async function savePhoneInfo() {
  var phone = (document.getElementById('pf-phone')||{}).value.trim().replace(/[^0-9]/g,'');
  if (phone.length !== 10) { showToast('📱 Enter valid 10-digit phone'); return; }
  try {
    await callAuth('update_profile', { phone: '+91' + phone }, true);
    if (_authProfile) _authProfile.phone = '+91' + phone;
    try { localStorage.setItem('pr_auth_profile', JSON.stringify(_authProfile)); } catch(e){}
    showSaveMsg('phone-msg');
  } catch(e) { showToast('❌ Save failed'); }
}

async function saveAddressInfo() {
  try {
    var updates = { address_line1: document.getElementById('pf-addr').value.trim(), city: document.getElementById('pf-city').value.trim(), state: document.getElementById('pf-state').value.trim(), postal_code: document.getElementById('pf-pin').value.trim() };
    await callAuth('update_profile', updates, true);
    Object.assign(_authProfile, updates);

}

function renderPasswordTab() {
  setPanel(`
    <div class="card">
      <div class="card-title">🔒 Change Password</div>
      <div class="form-grid">
        <div class="form-full"><div class="field-label">New Password</div><input class="field-input" id="cp-new" type="password" placeholder="Minimum 6 characters"></div>
        <div class="form-full"><div class="field-label">Confirm Password</div><input class="field-input" id="cp-confirm" type="password" placeholder="Repeat new password"></div>
      </div>
      <button class="btn-primary" onclick="doChangePassword()">🔒 Update Password</button>
      <div class="save-msg" id="cp-ok">✅ Password updated!</div>
      <div class="err-msg" id="cp-err"></div>
    </div>`);
}

async function doChangePassword() {
  var np = (document.getElementById('cp-new')||{}).value||'';
  var cp = (document.getElementById('cp-confirm')||{}).value||'';
  var ok = document.getElementById('cp-ok');
  var err = document.getElementById('cp-err');
  if (ok) ok.style.display='none';
  if (err) err.style.display='none';
  if (np.length < 6) { if(err){err.textContent='❌ Min 6 characters chahiye';err.style.display='block';} return; }
  if (np !== cp) { if(err){err.textContent='❌ Passwords match nahi kar rahe';err.style.display='block';} return; }
  try {
    await callAuth('change_password', { new_password: np }, true);
    if(ok) ok.style.display='block';
    document.getElementById('cp-new').value='';
    document.getElementById('cp-confirm').value='';
  } catch(e) {
    if(err){err.textContent='❌ '+(e.message||'Update failed');err.style.display='block';}
  }
}

// ── Logout ──
async function doLogout() {
  try { await callAuth('logout', {}, true); } catch(e){}
  try { localStorage.removeItem('pr_auth_token'); localStorage.removeItem('pr_auth_user'); localStorage.removeItem('pr_auth_profile'); localStorage.removeItem('pr_auth_refresh'); } catch(e){}
  window.location.href = '/';
}

// ── Helpers ──
function setPanel(html) { document.getElementById('main-panel').innerHTML = html; }
function showSaveMsg(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.style.display = 'block';
  setTimeout(function(){ el.style.display='none'; }, 2500);
}
function showToast(msg) {
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a3a1e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2500);
}

            '<span id="ret-refund-amt" style="font-size:20px;font-weight:900;color:#1a3a1e">₹' + orderTotal.toLocaleString('en-IN') + '</span>' +
          '</div>' +
        '</div>' +

        // Step 2: Reason
        '<div>' +
          '<div style="font-size:11px;font-weight:900;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">② Return Reason *</div>' +
          '<select id="ret-reason" style="width:100%;padding:14px 16px;border:1.5px solid #ddd;border-radius:12px;font-size:15px;font-family:Lato,sans-serif;color:#1a1a1a;background:#fff;outline:none;cursor:pointer">' +

              'wrong_item':'Wrong item received',
              'not_as_described':'Not as described',
              'changed_mind':'Changed my mind',
              'missing_parts':'Parts/accessories missing',

            }).map(function(e){ return '<option value="' + e[0] + '">' + e[1] + '</option>'; }).join('') +

        // Step 3: Description
        '<div>' +
          '<div style="font-size:11px;font-weight:900;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">③ Tell us more <span style="font-weight:400;color:#bbb">(optional)</span></div>' +
          '<textarea id="ret-desc" placeholder="Describe the issue in detail — helps us process faster…" rows="3" style="width:100%;padding:14px 16px;border:1.5px solid #ddd;border-radius:12px;font-size:14px;font-family:Lato,sans-serif;color:#1a1a1a;resize:vertical;outline:none;box-sizing:border-box;line-height:1.6"></textarea>' +
        '</div>' +

        // Policy
        '<div style="background:#e8f5e9;border-radius:10px;padding:14px 16px;border-left:3px solid #2d6a4f">' +
          '<div style="font-size:13px;font-weight:800;color:#1a3a1e;margin-bottom:6px">📋 Return Policy</div>' +
          '<div style="font-size:13px;color:#2d6a4f;line-height:1.7">Returns accepted within <strong>7 days</strong> of delivery. Our team reviews within <strong>24–48 hours</strong>. Refund to original payment method within 5–7 business days after we receive the item.</div>' +
        '</div>' +

        // Buttons
        '<div style="display:flex;gap:10px">' +
          '<button onclick="closeReturnModal()" style="flex:1;padding:16px;border:2px solid #e0e0e0;border-radius:14px;background:#fff;color:#7a7a7a;font-size:15px;font-weight:800;cursor:pointer;font-family:Lato,sans-serif;transition:all .2s" onmouseover="this.style.borderColor=\'#aaa\'" onmouseout="this.style.borderColor=\'#e0e0e0\'">Cancel</button>' +
          '<button onclick="submitReturn()" id="ret-submit-btn" style="flex:2;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#1a3a1e,#2d5233);color:#fff;font-size:15px;font-weight:900;cursor:pointer;font-family:Lato,sans-serif;letter-spacing:.3px;transition:opacity .2s">Submit Return Request →</button>' +
        '</div>' +

      '</div>' +
    '</div>';

  document.body.appendChild(modal);
  modal.addEventListener('click', function(e){ if(e.target===modal) closeReturnModal(); });
}

// Update refund total when items toggled
function updateReturnTotal() {
  if (!_returnOrder) return;
  var items = _returnOrder.items || [];
  var total = 0;
  items.forEach(function(item, idx) {
    var cb = document.getElementById('ret-item-' + idx);
    if (cb && cb.checked) total += (item.price || 0) * (item.qty || 1);
  });
  var el = document.getElementById('ret-refund-amt');
  if (el) el.textContent = '₹' + Math.round(total).toLocaleString('en-IN');
}

function closeReturnModal() {
  var m = document.getElementById('pr-return-modal');
  if (m) m.remove();
  _returnOrder = null;
}

// Amazon-style Return/Refund Status tracker
function openReturnStatusModal(orderId, orderJson) {
  try { _returnOrder = JSON.parse(decodeURIComponent(orderJson)); } catch(e) { _returnOrder = { id: orderId }; }
  var o = _returnOrder;
  var ret = o._return || {};
  var orderNum = o.order_number || ('ORD-' + String(o.id).slice(-6));
  var displayStatus = o._displayStatus || 'return_requested';

  // Timeline steps
  var STEPS = [
    { key:'return_requested', label:'Return started',      icon:'↩',  done:true },
    { key:'return_approved',  label:'Return approved',     icon:'✅', done:['return_approved','return_received','refunded'].includes(displayStatus) },
    { key:'return_received',  label:'Item received by us', icon:'📦', done:['return_received','refunded'].includes(displayStatus) },
    { key:'refunded',         label:'Refund credited',     icon:'💸', done:displayStatus === 'refunded' },
  ];
  if (displayStatus === 'return_rejected') {
    STEPS = [
      { key:'return_requested', label:'Return started',   icon:'↩', done:true },
      { key:'return_rejected',  label:'Request rejected', icon:'❌', done:true, rejected:true },
    ];
  }

  var retDate = ret.created_at ? new Date(ret.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}) : '';
  var orderDate = o.created_at ? new Date(o.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}) : '';
  var items = o.items || [];
  var refundAmt = Math.round(o.total_amount || 0).toLocaleString('en-IN');

  var mainColor = displayStatus === 'return_rejected' ? '#c0392b' : '#2d6a4f';
  var mainTitle = displayStatus === 'refunded' ? 'Refund Issued' :
    displayStatus === 'return_rejected' ? 'Return Rejected' :
    displayStatus === 'return_received' ? 'Item Received' :
    displayStatus === 'return_approved' ? 'Return Approved' : 'Return In Progress';
  var mainIcon = displayStatus === 'refunded' ? '✅' :
    displayStatus === 'return_rejected' ? '❌' :
    displayStatus === 'return_received' ? '📦' :
    displayStatus === 'return_approved' ? '✅' : '⏳';

  var statusMsg = {
    return_requested: 'Your return request is under review. We\'ll respond within 24–48 hours.',
    return_approved:  'Return approved! Please ship the item back to us.',
    return_received:  'We\'ve received your item. Refund is being processed.',
    refunded:         '₹' + refundAmt + ' has been refunded to your original payment method.',
    return_rejected:  'Your return request could not be approved. Contact support for help.',
  }[displayStatus] || '';

  var timelineHtml = STEPS.map(function(step, i) {
    var isLast = i === STEPS.length - 1;
    var dotColor  = step.done ? (step.rejected ? '#c0392b' : '#2d6a4f') : '#ddd';
    var lineColor = (i < STEPS.length - 1 && STEPS[i+1].done) ? '#2d6a4f' : '#e8e8e8';
    var labelColor = step.done ? (step.rejected ? '#c0392b' : '#1a1a1a') : '#bbb';
    return '<div style="display:flex;gap:18px;position:relative">' +
      '<div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">' +
        '<div style="width:42px;height:42px;border-radius:50%;background:' + dotColor + ';display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:900;box-shadow:0 2px 8px rgba(0,0,0,0.12)">' + (step.done ? step.icon : '') + '</div>' +
        (!isLast ? '<div style="width:3px;flex:1;background:' + lineColor + ';min-height:32px;margin:5px 0;border-radius:2px"></div>' : '') +
      '</div>' +
      '<div style="padding-top:8px;padding-bottom:' + (!isLast ? '28px' : '0') + '">' +
        '<div style="font-size:16px;font-weight:' + (step.done ? '800' : '500') + ';color:' + labelColor + '">' + step.label + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var itemsHtml = items.map(function(item) {
    var imgHtml = item.image_url
      ? '<img src="' + item.image_url + '" style="width:80px;height:80px;object-fit:cover;border-radius:12px;border:1.5px solid #eee;flex-shrink:0" onerror="this.style.display=\'none\'">'
      : '<div style="width:80px;height:80px;border-radius:12px;background:linear-gradient(135deg,#f5f0e8,#e8e0d0);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;border:1.5px solid #eee">' + (item.emoji||'🌿') + '</div>';
    return '<div style="display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid #f0f0f0">' +
      imgHtml +
      '<div style="flex:1">' +
        '<div style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:4px">' + (item.name||'Product') + '</div>' +
        '<div style="font-size:14px;color:#7a7a7a">Qty: ' + (item.qty||1) + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  // Render as a FULL PAGE in main-panel (not a popup)
  var html =
    '<div style="max-width:720px;margin:0 auto">' +
      // Back button
      '<button onclick="renderOrders(window._lastOrders||[])" style="display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:var(--g);font-size:14px;font-weight:800;cursor:pointer;padding:0;margin-bottom:24px;font-family:Lato,sans-serif">← Back to My Orders</button>' +

      // Hero status card
      '<div style="background:linear-gradient(135deg,' + (displayStatus==='return_rejected'?'#7f1d1d,#b91c1c':'#1a3a1e,#2d6a4f') + ');border-radius:20px;padding:32px;margin-bottom:28px;color:#fff">' +
        '<div style="font-size:13px;color:rgba(255,255,255,0.6);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Return Status</div>' +
        '<div style="font-size:28px;font-weight:900;font-family:Playfair Display,serif;margin-bottom:4px">' + mainIcon + ' ' + mainTitle + '</div>' +
        '<div style="font-size:14px;color:rgba(255,255,255,0.75);margin-top:6px">' + orderNum + (retDate ? ' · Requested ' + retDate : '') + '</div>' +
        '<div style="margin-top:18px;background:rgba(255,255,255,0.12);border-radius:12px;padding:14px 18px;font-size:14px;line-height:1.6;color:rgba(255,255,255,0.92)">' + statusMsg + '</div>' +
      '</div>' +

      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px">' +

        // Timeline card
        '<div style="background:#fff;border:1.5px solid #eee;border-radius:16px;padding:28px">' +
          '<div style="font-size:12px;font-weight:900;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:22px">Return Timeline</div>' +
          timelineHtml +
        '</div>' +

        // Refund summary card
        (displayStatus !== 'return_rejected' ?
          '<div style="background:#fff;border:1.5px solid #eee;border-radius:16px;padding:28px">' +
            '<div style="font-size:12px;font-weight:900;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:22px">Refund Summary</div>' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">' +
              '<span style="font-size:14px;color:#7a7a7a">Order total</span>' +
              '<span style="font-size:14px;color:#1a1a1a;font-weight:600">₹' + refundAmt + '</span>' +
            '</div>' +
            '<div style="display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-top:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0">' +
              '<span style="font-size:15px;font-weight:800;color:#1a1a1a">Expected refund</span>' +
              '<span style="font-size:26px;font-weight:900;color:#1a3a1e">₹' + refundAmt + '</span>' +
            '</div>' +
            (displayStatus === 'refunded' ?
              '<div style="margin-top:16px;background:#e8f5e9;border-radius:10px;padding:12px 16px;font-size:13px;color:#2d6a4f;font-weight:700;line-height:1.5">✅ Refunded to your original payment method</div>'
            : '<div style="margin-top:16px;font-size:13px;color:#7a7a7a;line-height:1.5">Refund will be processed within 5–7 business days after we receive the item.</div>') +
          '</div>'
        :
          '<div style="background:#fff;border:1.5px solid #eee;border-radius:16px;padding:28px">' +
            '<div style="font-size:12px;font-weight:900;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px">Need Help?</div>' +
            '<div style="font-size:14px;color:#555;line-height:1.7;margin-bottom:16px">If you believe this decision was incorrect, please contact our support team with your order number and we\'ll review it manually.</div>' +
            '<a href="mailto:support@pahadiroots.com" style="display:inline-flex;align-items:center;gap:8px;background:#1a3a1e;color:#fff;padding:12px 20px;border-radius:10px;text-decoration:none;font-size:13px;font-weight:800">📧 Contact Support</a>' +
          '</div>'
        ) +

      '</div>' +

      // Items in return
      (items.length > 0 ?
        '<div style="background:#fff;border:1.5px solid #eee;border-radius:16px;padding:28px;margin-bottom:28px">' +
          '<div style="font-size:12px;font-weight:900;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Items in Return</div>' +
          '<div style="font-size:13px;color:#bbb;margin-bottom:16px">' + items.length + ' item' + (items.length>1?'s':'') + '</div>' +
          itemsHtml +
        '</div>'
      : '') +

      // Back button bottom
      '<button onclick="renderOrders(window._lastOrders||[])" style="width:100%;padding:16px;border:2px solid #e0e0e0;border-radius:14px;background:#fff;color:#1a3a1e;font-size:15px;font-weight:800;cursor:pointer;font-family:Lato,sans-serif;margin-bottom:24px">← Back to My Orders</button>' +

    '</div>';

  setPanel(html);
}

async function submitReturn() {
  var reason = (document.getElementById('ret-reason')||{}).value;
  var desc   = (document.getElementById('ret-desc')||{}).value.trim();
  var btn    = document.getElementById('ret-submit-btn');
  if (!reason) { showToast('Please select a return reason'); return; }
  if (!_returnOrder) { showToast('❌ Order not found'); return; }

  // Collect selected items
  var allItems = _returnOrder.items || [];
  var selectedItems = allItems.filter(function(item, idx) {
    var cb = document.getElementById('ret-item-' + idx);
    return cb ? cb.checked : true;
  });
  if (allItems.length > 0 && selectedItems.length === 0) {
    showToast('Please select at least one item to return'); return;
  }

  if (btn) { btn.textContent = 'Submitting…'; btn.disabled = true; }

  try {
    var p = _authProfile || {};
    var customerName = [p.first_name, p.last_name].filter(Boolean).join(' ') || null;
    var orderNum = _returnOrder.order_number || ('ORD-' + String(_returnOrder.id).slice(-6));

    var res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + _authToken },
      body: JSON.stringify({
        action:         'create_return',
        order_id:       _returnOrder.id,
        order_number:   orderNum,
        customer_name:  customerName,
        reason:         reason,
        description:    desc || null,
        refund_amount:  _returnOrder.total_amount || null,
        selected_items: selectedItems,
        is_partial:     selectedItems.length < allItems.length,
      })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    closeReturnModal();
    showToast('✅ Return request submitted! We\'ll respond within 24–48 hours.');
    // Update the order in _orders array to show return_requested immediately
    if (_orders) {
      _orders = _orders.map(function(o) {
        if (String(o.id) === String(_returnOrder.id)) {
          return Object.assign({}, o, { _displayStatus: 'return_requested' });
        }
        return o;
      });
    }
    renderOrdersTab();
  } catch(e) {
    if (btn) { btn.textContent = 'Submit Return Request'; btn.disabled = false; }
    showToast('❌ ' + (e.message || 'Submission failed. Please try again.'));
  }
}
